version: "3.8"

services:
  clawhalla:
    build: .
    container_name: clawhalla
    hostname: clawhalla
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "18789:18789"
      - "3333:3000"
    volumes:
      - ./volumes/openclaw:/home/clawdbot/.openclaw
    env_file:
      - .env

  # Uncomment below to run Mission Control as separate container
